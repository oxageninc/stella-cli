[workspace]
resolver = "3"
members = [
  "stella-protocol",
  "ocp-types",
  "stella-core",
  "stella-model",
  "stella-store",
  "stella-tools",
  "stella-cli",
  "stella-context",
  "stella-graph",
  "stella-pipeline",
  "stella-mcp",
  "stella-media",
  "stella-fleet",
  "stella-tui",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.90"
license = "MIT OR Apache-2.0"
repository = "https://github.com/oxageninc/stella-cli"
publish = false

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "process", "fs", "io-util", "sync"] }
async-trait = "0.1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
futures-util = "0.3"
clap = { version = "4", features = ["derive", "env"] }
colored = "3"
indicatif = "0.18"
libc = "0.2"
rand = "0.9"
proptest = "1"
toml = "0.9"
rpassword = "7"
base64 = "0.22"
crossterm = "0.28"
notify = "8"
ratatui = "0.29"
roxmltree = "0.20"
rusqlite = { version = "0.32", features = ["bundled"] }
sha2 = "0.10"
tempfile = "3"
tree-sitter = "0.25"
tree-sitter-javascript = "0.23"
tree-sitter-python = "0.23"
tree-sitter-rust = "0.23"
tree-sitter-typescript = "0.23"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
