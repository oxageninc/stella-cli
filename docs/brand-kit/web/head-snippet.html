<!-- ============================================================
     STELLA · PWA <head> snippet
     Copy into your document <head>. Adjust paths to match where
     you deploy /icons, /web and /social (root-relative shown).
     ============================================================ -->

<!-- Favicons -->
<link rel="icon" href="/icons/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">

<!-- iOS home-screen -->
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stella">

<!-- iOS splash (add more sizes as needed) -->
<link rel="apple-touch-startup-image" href="/social/pwa-splash-1290x2796.png"
      media="(device-width:430px) and (device-height:932px) and (-webkit-device-pixel-ratio:3)">

<!-- PWA manifest + theming -->
<link rel="manifest" href="/web/manifest.webmanifest">
<meta name="theme-color" content="#0B0A08">
<meta name="color-scheme" content="dark light">

<!-- Social / Open Graph -->
<meta property="og:title" content="Stella">
<meta property="og:description" content="Stella — a bright, minimal experience.">
<meta property="og:image" content="/social/og-card-1200x630.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="/social/og-card-1200x630.png">
