<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Loading Stella">
  <defs>
    <linearGradient id="lg" x1="40" y1="24" x2="164" y2="182" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD97A"/><stop offset=".5" stop-color="#F5B33C"/><stop offset="1" stop-color="#E08A20"/>
    </linearGradient>
  </defs>

  <!-- pulsing glow -->
  <circle cx="100" cy="100" r="52" fill="#F5B33C">
    <animate attributeName="opacity" values="0;0.10;0.20;0.10;0" keyTimes="0;0.25;0.55;0.82;1" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="34;52;60;52;34" keyTimes="0;0.25;0.55;0.82;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- breathe -->
  <g transform="translate(100 100)">
    <animateTransform attributeName="transform" type="scale" additive="sum"
      values="0.84;1;1;0.84" keyTimes="0;0.45;0.82;1" dur="2.4s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/>
    <g transform="translate(-100 -100)">
      <!-- fill fades in behind the outline, stays, then fades for loop -->
      <path d="M100 8 C104 74 126 96 192 100 C126 104 104 126 100 192 C96 126 74 104 8 100 C74 96 96 74 100 8 Z"
            fill="url(#lg)">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.32;0.5;0.82;1" dur="2.4s" repeatCount="indefinite"/>
      </path>
      <!-- outline draws the star on, then hands off to the fill -->
      <path d="M100 8 C104 74 126 96 192 100 C126 104 104 126 100 192 C96 126 74 104 8 100 C74 96 96 74 100 8 Z"
            fill="none" stroke="#FFD27A" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="round"
            pathLength="100" stroke-dasharray="100">
        <animate attributeName="stroke-dashoffset" values="100;0;0" keyTimes="0;0.44;1" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.46;0.6;0.95;1" dur="2.4s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>
