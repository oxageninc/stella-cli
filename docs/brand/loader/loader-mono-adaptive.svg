<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="256" height="256">
<style>@media (prefers-color-scheme: dark){.ch-cs{stroke:#FFF6E9}.ch-cf{fill:#FFF6E9}}</style>
  <style>
    .ld-ring{stroke-dasharray:251.33;animation:ld-draw 3.4s cubic-bezier(.6,.05,.3,1) infinite}
    .ld-pop{transform-box:fill-box;transform-origin:center;animation:ld-pop 3.4s cubic-bezier(.34,1.56,.64,1) infinite}
    .ld-ant{animation-name:ld-ant}
    .ld-p1{animation-delay:.12s}.ld-p2{animation-delay:.2s}.ld-p3{animation-delay:.3s}
    .ld-p4{animation-delay:.42s}.ld-p5{animation-delay:.48s}.ld-p6{animation-delay:.55s}
    .ld-star{transform-box:fill-box;transform-origin:center;animation:ld-star 3.4s ease-in-out infinite}
    .ld-scene{animation:ld-fade 3.4s linear infinite}
    @keyframes ld-draw{0%{stroke-dashoffset:251.33}22%,100%{stroke-dashoffset:0}}
    @keyframes ld-pop{0%,20%{transform:scale(0)}34%,100%{transform:scale(1)}}
    @keyframes ld-ant{0%,22%{transform:scale(0)}32%,100%{transform:scale(1)}}
    @keyframes ld-star{0%,58%{transform:scale(0) rotate(-90deg);opacity:0}70%{transform:scale(1.25) rotate(8deg);opacity:1}78%,100%{transform:scale(1) rotate(0deg);opacity:1}}
    @keyframes ld-fade{0%,88%{opacity:1}97%,100%{opacity:0}}
  </style><defs>
    <mask id="mEars"><rect width="120" height="120" fill="#fff"/><circle cx="60" cy="64" r="24" fill="#000"/></mask>
    <mask id="mRing"><rect width="120" height="120" fill="#fff"/><path d="M 88.3 24.2 L 92.1 30.9 L 98.8 34.7 L 92.1 38.5 L 88.3 45.2 L 84.5 38.5 L 77.8 34.7 L 84.5 30.9 Z" fill="#000"/></mask>
  </defs><g class="ld-scene"><g class="ld-pop ld-p1"><g  mask="url(#mEars)">
    <rect class="ch-cf" x="30.5" y="38" width="13" height="30" rx="6.5" transform="rotate(20 37 53)" fill="#2A1A35"/>
    <rect class="ch-cf" x="76.5" y="38" width="13" height="30" rx="6.5" transform="rotate(-20 83 53)" fill="#2A1A35"/>
  </g></g><circle class="ld-pop ld-p2 ch-cs" cx="60" cy="64" r="24" fill="none" stroke="#2A1A35" stroke-width="4"/>
    <circle class="ld-pop ld-p4 ch-cf" cx="51" cy="60" r="3.3" fill="#2A1A35"/>
    <circle class="ld-pop ld-p4 ch-cf" cx="69" cy="60" r="3.3" fill="#2A1A35"/>
    <ellipse class="ld-pop ld-p5 ch-cf" cx="60" cy="69.5" rx="4.6" ry="3.6" fill="#2A1A35"/>
    <path class="ld-pop ld-p6 ch-cs" d="M60 72.5 L60 76.5 M60 76.5 C57 79.6 54 78.6 53 76.4 M60 76.5 C63 79.6 66 78.6 67 76.4" fill="none" stroke="#2A1A35" stroke-width="1.8" stroke-linecap="round"/><g mask="url(#mRing)"><circle class="ld-ring ch-cs" cx="60" cy="63" r="40" fill="none" stroke="#2A1A35" stroke-width="7"/></g><g class="ld-pop ld-ant"><rect class="ch-cf" x="42" y="96" width="36" height="13" rx="6" fill="#2A1A35"/><line class="ch-cs" x1="60" y1="20" x2="60" y2="12" stroke="#2A1A35" stroke-width="4" stroke-linecap="round"/><circle class="ch-cf" cx="60" cy="9.5" r="3.4" fill="#2A1A35"/></g></g>
</svg>
