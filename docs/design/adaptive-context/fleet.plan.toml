[[tasks]]
id = "t03-context-schema"
title = "Phase 2a: canonical context_records schema + repositories"
prompt = '''
You are one task in a fleet implementing Stella's Adaptive Context Lifecycle.
Read first: AGENTS.md; the build prompt "Storage contract"; implementation
plan Phase 2 (the exact table list is normative); lifecycle spec section 7.6.
Constraints: stella-context/src/store.rs is pinned by the file-size ratchet —
register the new migration there minimally; ALL new DDL and repository code
lives in new modules. Extend the existing PRAGMA user_version migration
system (single transaction, version bump) — no new database file.

Deliver:

1. Cargo: add stella-core as a path dependency of stella-context (types live
   in stella-core per the implementation plan crate matrix; core is I/O-free
   so the edge is clean — one-sentence justification in the commit body).
2. Migration V4 creating the implementation-plan Phase 2 tables exactly:
   context_records (record_id PK, lineage_id nullable, schema_version,
   record_kind, record_status, scope_json, sharing_scope, sensitivity,
   observed_at, valid_from, valid_until, confidence, supersedes_record_id,
   record_hash, canonical_json, source_of_truth_kind, source_of_truth_ref);
   context_record_links; context_evidence_links; context_record_ingestions
   (unique record_id+provider_id); extraction_cursors (unique source_kind+
   source_id+extractor_id+extractor_version); compiled_context_frames (with
   tokenizer_ref, known_at, valid_at, input_hash, frame_hash, frame_json,
   budget_json, manifest_json); compiled_context_frame_items (full column
   list from the plan, including representation, content_fidelity,
   canonical_content_hash, minimum_content_fidelity,
   inline_content_requirement, transform_json, selection_reason, token_cost);
   context_health_projection; context_exports (with the actor_ref-or-
   consent_ref CHECK) and context_export_items (unique export_id+ordinal;
   provider idempotency uniqueness). Indexes per the plan's minimum list;
   scope hot dimensions get validated projection columns, not JSON scans.
3. canonical_json is THE single authoritative byte representation: writes
   parse+validate against the stella-core types, compute/verify record_hash
   (core's JCS hasher), and write canonical row + projection columns + link
   rows in ONE transaction. Reads verify hash on demand. Records are
   IMMUTABLE: any semantic/status/scope/sharing/enforcement change inserts a
   new record_id in the same lineage with supersedes_record_id; a repository
   API that mutates a canonical row must not exist.
4. Typed repositories in new modules: append/get/list by kind+status+
   sharing; revision chains; ingestion ledger writes; extraction cursor
   get/set; idempotent append (same idempotency key + same record_hash =
   prior receipt; same key + different hash = typed conflict error, matching
   the lifecycle spec's append semantics); health-projection rebuild fn that
   reconstructs rows exactly from immutable use/feedback records (used by a
   later phase, land the seam now).
5. Tests: migration on the Phase 0 fixture db (transactional, idempotent
   rerun is a no-op via stored version+content hashes, integrity_check and
   foreign_key_check pass); hash-verified round trip; immutability enforced;
   projection columns rebuild exactly from canonical_json (the
   projection-rebuild witness the plan requires, at least for this task's
   tables).

Run: cargo test -p stella-context && cargo fmt && cargo clippy -p
stella-context --all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-context): canonical context_records
schema, repositories, ingestion ledger". Reconcile with landed work.
'''
depends_on = ["t01-core-types"]
claims = [
  "stella-context/src/lib.rs",
  "stella-context/src/store.rs",
  "stella-context/Cargo.toml",
]

[[tasks]]
id = "t04-legacy-migration"
title = "Phase 2b: legacy memory/fact migration, adapters, rule mirrors"
prompt = '''
You are one task in a fleet implementing Stella's Adaptive Context Lifecycle.
This is the riskiest slice of the whole effort (plan-header note N2): it
re-roots storage authority while the live recall pipeline keeps working.
Read first: AGENTS.md; the build prompt "Storage contract" (its migration
paragraphs are your exact contract); implementation plan Phase 2 "Migration"
items 1-10 and the Phase 2 gate; the Phase 0 inventory ADR
(docs/design/adaptive-context/adr/0000-inventory.md) for the legacy paths.

Deliver, in stella-context (+ the smallest possible stella-cli glue):

1. Migrate every legacy memory row and Memory graph node into canonical
   context_records: losslessly, as record_kind=memory (episode), preserving
   public ids in the lineage mapping. NEVER semantically reclassify during
   migration (no LLM, no heuristics) — later reclassification is a
   RecordProposal. Explicitly typed legacy facts (context.db edges used as
   fact assertions) migrate as knowledge:fact records preserving supersession
   history where the edge close-and-supersede chain expresses it.
2. Legacy tables become rebuildable projections/compatibility views over the
   canonical repository: the existing memory table and Memory nodes keep
   serving the CURRENT recall pipeline byte-compatibly, now derived from
   canonical rows in the same transaction. Existing MemoryInput/recall APIs
   become adapters over the canonical repository. The Phase 0 as_of
   characterization tests must still pass unchanged (or gain the documented
   adapter mapping the build prompt demands — map as_of to known_at/valid_at
   only as those tests prove; never guess).
3. Import existing .stella/rules/*.md as authoritative READ-ONLY mirrors:
   record_kind=directive rows with source_of_truth_kind=repository_rule_file
   and source_of_truth_ref = normalized repo path; the lifecycle repository
   rejects writes to them. If legacy store.db rule rows exist (see the
   inventory ADR), stop new lifecycle writes there; file-less rows migrate
   conservatively as imported, repository-applicable but user-shared local
   directives (no Git changes, no sharing widening).
4. A projection-rebuild command surface (internal fn + a `stella context
   rebuild-projections` diagnostic if trivial to wire; otherwise the fn +
   test) that reproduces graph/index rows byte-for-byte from canonical_json.
5. Tests = the Phase 2 gate, verbatim: every Phase 0 fixture migrates
   transactionally; record counts and content checksums reconcile; existing
   memory/fact recall tests remain green (or have documented semantic
   replacements); replaying the migration creates no duplicates; SQLite
   integrity passes; rule mirrors cannot be edited through the repository;
   projection rebuild reproduces rows exactly.

Run: cargo test -p stella-context -p stella-cli && cargo fmt && cargo clippy
-p stella-context --all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-context): legacy migration to canonical
records, compatibility adapters, rule mirrors". Reconcile with landed work.
'''
depends_on = ["t03-context-schema"]
claims = [
  "stella-context/src/lib.rs",
  "stella-context/src/writeback.rs",
  "stella-context/src/retrieval.rs",
]

# ---------------------------------------------------------------------------
# Phase 3 — temporal queries + CompiledContextFrame
# ---------------------------------------------------------------------------

[[tasks]]
id = "t05-temporal-queries"
title = "Phase 3a: typed temporal query API (known_at / valid_at / ranges)"
prompt = '''
You are one task in a fleet implementing Stella's Adaptive Context Lifecycle.
Read first: the build prompt "Canonical property contract" temporal
paragraphs; implementation plan Phase 3 "Temporal repository API" (its
semantics block is normative, copy it into the module doc); lifecycle spec
7.4-7.5.

Deliver, in stella-context:

1. One typed query implementation over the canonical repository with EXACTLY
   these semantics: known_at filters local_knowledge_time <= known_at, where
   local_knowledge_time = observed_at for locally originated records and the
   MINIMUM context_record_ingestions.received_at for imported records —
   reject known_at queries with a typed error when durable ingestion history
   is unavailable rather than silently substituting origin time. valid_at:
   valid_from <= valid_at < valid_until (null valid_until = open). observed
   [from,until) filters canonical origin observed_at. valid_overlaps
   [from,until) uses the half-open overlap rule. Claim-bearing kinds
   (knowledge, directive, artifact_contract) require non-null valid_from;
   event-only records are excluded from validity queries unless
   include_records_without_validity=true. Invalid or contradictory filters
   are typed errors, never reinterpreted.
2. Historical reconstruction: restrict records AND lifecycle events to
   local_knowledge_time <= known_at first, derive effective status
   (superseded/expired) from only that prefix, then apply validity, then
   select the maximal applicable revision per lineage via
   supersedes_record_id. A revision received or created after known_at can
   never affect the result — test this with an imported-record fixture whose
   origin observed_at predates its ingestion.
3. Truth-table tests for boundary instants (from inclusive, until exclusive,
   null handling under SQLite) and property tests for revision selection.
   Wire the deprecated ContextQuery.as_of adapter to this API exactly as the
   Phase 0 characterization tests dictate.

Run: cargo test -p stella-context && cargo fmt && cargo clippy -p
stella-context --all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-context): typed temporal queries and
historical reconstruction". Reconcile with landed work.
'''
depends_on = ["t04-legacy-migration"]
claims = ["stella-context/src/lib.rs"]

[[tasks]]
id = "t06-frame-compiler"
title = "Phase 3b: deterministic CompiledContextFrame + manifest + precedence"
prompt = '''
You are one task in a fleet implementing Stella's Adaptive Context Lifecycle.
Read first: the build prompt "Frame and compaction contract"; implementation
plan Phase 3 "Frame compiler" and "Precedence" (both normative); lifecycle
spec sections 9 and 11.

Deliver, in stella-context (new module, e.g. frame_compiler.rs):

1. The twelve-step compilation pipeline from implementation-plan Phase 3:
   resolve scope without widening; retrieve active temporally-applicable
   records via the typed temporal API; exclude retracted/archived/expired/
   suppressed/incompatible-sharing records; apply the CATEGORY-AWARE
   precedence ladder exactly (authorization + system policy; confirmed
   organization constraints; authenticated blocking workspace/repository
   constraints; current-task instructions; selected required contracts;
   confirmed workspace/repository directives; confirmed user directives;
   current knowledge; advisory inferred directives; memories; observation
   summaries and untrusted evidence) — sharing scope is NOT authority;
   confidence never overrides authority; a preference never overrides a
   constraint; a memory never overrides current knowledge; at equal
   authority narrower applicability wins and unresolved workspace/repository
   conflicts remain explicit conflict records; detect contradictions and
   supersession; select required constraints and contracts (required items
   can never be evicted by ranking); rank optional records; allocate a
   deterministic budget; choose per-item representation and fidelity
   defaults (full for v1 — compaction is the next phase; the fields exist
   now); produce the immutable manifest; persist frame + ordered items;
   emit ContextUse records with use_kind=selected (stable use_trace_id per
   record/frame/invocation).
2. frame_hash over the RFC 8785 canonical semantic frame body (reuse core's
   JCS hasher) with compiled_frame_id, frame_hash, compiled_at omitted;
   tokenizer_ref declared on every frame (v1: the existing chars/4 estimator,
   named e.g. "stella-estimate/chars4-v1" — do NOT add a tokenizer
   dependency); token_cost computed under it for every item.
3. The manifest records compiler and policy versions, inputs, input_hash,
   included ids, exclusion reasons, conflicts, provider query refs,
   transformations, ordering, and section budgets.
4. Plan-header note N4: the compiler is invoked once per pipeline run at the
   existing ContextRecallPort seam (a later task wires it); design the API
   so per-invocation compilation and cached bases can come later without
   changing the frame schema.
5. Tests = the Phase 3 gate: identical inputs produce byte-identical
   semantic frame bodies, ordering, and frame_hash (envelope id/time may
   differ); known_at vs valid_at historical tests; scope-leakage negative
   tests at every dimension; conflicts and exclusions inspectable; required
   items cannot be evicted; existing provider query behavior unchanged.

Run: cargo test -p stella-context && cargo fmt && cargo clippy -p
stella-context --all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-context): deterministic
CompiledContextFrame compiler with category-aware precedence". Reconcile
with landed work.
'''
depends_on = ["t05-temporal-queries"]
claims = ["stella-context/src/lib.rs", "stella-context/src/frame_compiler.rs"]

