[[tasks]]
id = "t07-compaction-prompt"
title = "Phase 4: representations, fidelity, deterministic PromptContext"
prompt = '''
You are one task in a fleet implementing Stella's Adaptive Context Lifecycle.
Read first: the build prompt "Frame and compaction contract"; implementation
plan Phase 4 (invariants and gate are normative); lifecycle spec section 10.

Deliver:

1. In stella-context: representation full|compact|reference and
   content_fidelity exact|normalized|summarized|omitted with the exact
   invariants: full requires canonical inline content; compact requires
   inline content + transformation identity + inline hash + canonical hash +
   content_ref + resolve support; reference omits inline content and
   requires opaque content_ref + canonical hash, and resolution VERIFIES the
   canonical hash; blocking constraints, guards, ordered procedures, and
   machine-checkable contract structures never fall below exact fidelity at
   their point of use; summaries stay linked to canonical records; token
