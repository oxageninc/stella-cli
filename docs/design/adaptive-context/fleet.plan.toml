# ============================================================================
# Adaptive Context Lifecycle — stella-fleet build plan (spec bundle v2)
#
# Deserializes into `stella_fleet::Plan` ([[tasks]]: id / title / prompt /
# depends_on / isolation / claims). Built from the canonical spec bundle in
# THIS directory. Normative inputs for every worker:
#   docs/design/adaptive-context/stella-adaptive-context-lifecycle.md
#   docs/design/adaptive-context/adaptive-context-implementation-plan.md
# Authority/working rules for every worker:
#   docs/design/adaptive-context/stella-adaptive-context-build-prompt.md
# Background companions (informative, not normative):
#   context-frame-spec.md, directive-schema.md
# Excluded from this plan by the build prompt ("do not edit
# context-graph-protocol from this repository"): the CGEP protocol work —
# context-graph-protocol-build-prompt.md runs in that repo separately.
#
# HOW TO RUN
#   git checkout -b feat/adaptive-context   # designated long-running
#                                           # implementation branch (the build
#                                           # prompt's multi-phase exception —
#                                           # this fleet run IS that branch)
#   stella fleet --plan docs/design/adaptive-context/fleet.plan.toml \
#     --max-concurrency 3 --budget 200
#
#   - Shared tree; same-crate work serialized via depends_on; declared claims
#     are dependency-ordered (a same-wave claim conflict permanently fails
#     dispatch), and additionally guard against other sessions in this
#     workspace.
#   - Per-child budget = --budget / --max-concurrency. The fleet stops
#     launching waves at the cap; in-flight tasks settle first.
#   - No resume: a failed task skips its dependents; re-running re-dispatches
#     everything, so every prompt instructs the worker to RECONCILE with
#     already-landed work instead of duplicating it.
#   - Tasks map 1:1 onto the implementation plan's phases and their gates
#     (Phase 0 → t00 ... Phase 9 → t20/t21). Phase 10 (CGEP interop) is
#     deliberately absent: separate repo, separate handoff prompt, and gated
#     on a second provider use case.
#
# EVERYTHING SHIPS DISABLED: context.lifecycle.enabled=false is the master
# flag; learning.mode (off | record_only | advisory) and governance.mode
# (solo | team | regulated) are independent dimensions. No task may change
# default behavior for a workspace without the new settings.
#
# CARRIED-FORWARD REVIEW NOTES (N1-N6) — the spec bundle resolved the earlier
# D1-D7 pushback; these are the residual risks, each assigned to tasks:
#   N1 RFC 8785 (JCS) canonical hashing has no existing crate dep in this
#      workspace. t01 owns the strategy: hand-rolled minimal JCS (sorted keys,
#      canonical string escapes, integer-only number policy documented) OR a
#      small vetted dep with the AGENTS.md justification sentence. Golden
#      vectors with real 64-hex digests either way.
#   N2 Phase 2 re-roots storage authority (canonical_json) under the LIVE
#      recall pipeline — the riskiest slice. t03/t04 are split and gated on
#      byte-compat recall fixtures and a projection-rebuild witness.
#   N3 The spec never names `.stella/memories/*.md` (save_memory prompt-prefix
#      files) or the reflections→skills auto-creation pipeline. t00's ADR must
#      settle their relationship (v1 recommendation: untouched, documented as
#      adjacent systems; reclassification later via RecordProposal).
#   N4 CompiledContextFrame is per-invocation in the spec; v1 compiles once
#      per pipeline run at the existing ContextRecallPort seam (t06/t07), with
#      the cached stable-base + delta optimization deferred until full-frame
#      correctness (per the plan's own Phase 4 ordering).
#   N5 The json_schema requirement kind needs a validator: t16 decides between
#      a bounded structural checker (no dep) or a justified vetted dep.
#   N6 Contract selection "by intent" has no intent taxonomy in Stella (triage
#      knows SimpleLookup/SingleTask/MultiStep). v1 = explicit selection +
#      triage class + the user's stated choice; a real taxonomy is follow-up.
# ============================================================================

[[tasks]]
id = "t00-baseline"
title = "Phase 0: baseline, ADRs, fixtures, disabled settings"
prompt = '''
You are one task in a fleet implementing Stella's Adaptive Context Lifecycle.
Normative inputs (read first, in this order): AGENTS.md;
docs/design/adaptive-context/stella-adaptive-context-build-prompt.md (your
authority and working rules); docs/design/adaptive-context/
adaptive-context-implementation-plan.md section "Phase 0"; the lifecycle
specification (stella-adaptive-context-lifecycle.md) sections 1-7 for
vocabulary. Binding repo rules: typed errors, no unwrap on runtime data, no
new dependencies without a justifying sentence, new .rs files <= 1500 lines,
rustfmt + clippy -D warnings clean.

Deliver Phase 0 exactly:

1. Baseline record: run make gate (or its documented equivalents) and record
   the result; record the current Cargo dependency graph (cargo tree -e
   normal --depth 1 per crate is fine) in a docs note.
2. Inventory, written as docs/design/adaptive-context/adr/0000-inventory.md:
   every current memory, fact, rule-mining, journal, event, provider, and
   context-frame code path with file references. Explicitly cover: the
   unwired stella-core rules::mine_candidates; stella-cli memory.rs
   reflection loop and skills auto-creation; `stella memory promote`; the
   store.db `rules` table and any Store::list_rules path; `.stella/memories/
   *.md` and the save_memory tool (the spec does not name these two — your
   ADR must settle their v1 relationship; recommended: untouched adjacent
   systems, later reclassification via RecordProposal).
3. Characterization tests for the current ContextQuery.as_of behavior in
   stella-context (tests only — pin what it actually means today; do NOT
   assume knowledge vs validity semantics).
4. Fixture copies committed to tests: a current-version context.db and
   store.db fixture (schema-version-stamped, generated by a small test
   helper, not a binary blob if the repo convention prefers SQL/seed fns),
   plus representative .stella/rules/*.md files including hyphenated legacy
   guard keys.
5. ADRs under docs/design/adaptive-context/adr/ (one file each, short):
   semantic taxonomy; scope vs sharing; bitemporal semantics; record revision
   identity; storage authority (canonical_json); ContextFrame vs
   CompiledContextFrame; immutable promotion history; Markdown rules remain
   canonical; memories-files-and-skills relationship (N3).
6. Disabled settings in stella-cli/src/settings.rs: the exact tuple from the
   implementation plan Phase 0 — context.lifecycle.enabled (default false),
   context.learning.mode (off | record_only | advisory, default off),
   context.governance.mode (solo | team | regulated, default solo),
   promotion.inferred_directive { min_observations 3, min_distinct_tasks 3,
   auto_activate_at_confidence 85, initial_enforcement "advisory" },
   promotion.blocking_directive.requires_explicit_confirmation true,
   retention { raw_observation_days 30, proposal_days 30,
   inferred_directive_review_days 180 }. Three-scope per-field merge like the
   existing sections; absent section == everything off; expose is_enabled()
   and learning/governance accessors. Tests: defaults preserve current
   behavior; merge precedence; unknown-field tolerance.

Phase 0 gate (verify and state results): existing workspace checks pass
before your change; fixtures committed; settings deserialize with
behavior-preserving defaults; no network or repository mutation introduced.

Run: cargo test -p stella-cli -p stella-context && cargo fmt && cargo clippy
-p stella-cli -p stella-context --all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-cli): adaptive-context Phase 0 —
baseline ADRs, fixtures, disabled settings". If prior fleet work already
landed parts of this, reconcile and complete rather than duplicate.
'''
depends_on = []
claims = ["stella-cli/src/settings.rs"]

# ---------------------------------------------------------------------------
# Phase 1 — pure domain types + internal events
# ---------------------------------------------------------------------------

[[tasks]]
id = "t01-core-types"
title = "Phase 1a: domain types, validators, JCS record hashing in stella-core"
prompt = '''
You are one task in a fleet implementing Stella's Adaptive Context Lifecycle.
Read first: AGENTS.md; docs/design/adaptive-context/
stella-adaptive-context-build-prompt.md (sections "Normative vocabulary" and
"Canonical property contract" are your exact contract); the implementation
plan Phase 1 (stella-core list); lifecycle spec sections 6-8. stella-core does
NO I/O — pure types and functions over owned data, property-testable.

Deliver, in a new module tree stella-core/src/context/ (mod.rs + focused
submodules, each <= 1500 lines):

1. The full domain vocabulary from implementation-plan Phase 1:
   ContextRecordKind (12 kinds); KnowledgeKind (fact|assumption|decision);
   MemoryKind (episode|summary); DirectiveKind
   (preference|rule|constraint|procedure); ConstraintEffect (require|forbid —
   never allow); RecordStatus (active|retracted|archived) and derived
   EffectiveStatus (+superseded, expired); RecordProposalKind and
   RecordProposalStatus (collecting|eligible|dismissed|expired);
   PromotionAction (proposed|auto_activated|confirmed|published|rejected|
   retired|reverted); DirectiveEnforcement (advisory|blocking); Scope (7 ids)
   and SharingScope (user|repository|workspace|organization); Sensitivity
   (public|internal|confidential|restricted); TemporalInterval and
   TemporalQuery (known_at, valid_at, observed [from,until),
   valid_overlaps [from,until) — half-open, exclusive until);
   ContextUseKind (selected|rendered|cited) and ContextUseEvaluation;
   ArtifactContract + requirement kinds + validation result types;
   OutcomeAssessment with INDEPENDENT completion_assessment and
   correctness_assessment each carrying its own assessment_level
   (verified|user_confirmed|externally_confirmed|inferred|unknown);
   frame Representation (full|compact|reference), ContentFidelity
   (exact|normalized|summarized|omitted), minimum_content_fidelity,
   inline_content_requirement; structured Provenance (origin_provider_id,
   origin_authority_id, producer_kind, producer_ref, derivation_kind,
   source_refs) with the producer/derivation validation matrix from the build
   prompt; evidence links ({evidence_id, relation}) with the five portable
   relations; the record envelope (record_id, lineage_id,
   supersedes_record_id, record_status, record_hash, scope, sharing_scope,
   sensitivity, observed_at, valid_from, valid_until, extensions).
   DraftRecordBody for proposals (deliberately no id/time/hash).
2. Cross-field validators as constructors or validate fns, exactly the
   implementation-plan examples: valid_until > valid_from; inferred directive
   cannot be blocking at creation; inferred record requires nonempty scope;
   procedure steps unique and ordered; confidence 0..=100; a reference
   representation has no inline-content placeholder; blocking/guarded
   directives require exact minimum fidelity; sharing value requires its
   matching scope id (user_id/repository_id/workspace_id/organization_id).
3. Canonical record hashing (note N1 in the plan header): record_hash =
   "sha256:<64 lowercase hex>" over RFC 8785 (JCS) bytes of the canonical
   record with record_hash omitted, after alias normalization, absent-option
   omission, null-as-absence, and UTC timestamp normalization (trailing
   fractional zeros removed). Strategy is yours: a minimal hand-rolled JCS
   (sorted keys, canonical escapes; document an integers-only number policy)
   or a small vetted crate WITH the AGENTS.md justification sentence in the
   commit body. Provide golden vectors with REAL 64-hex digests (the spec
   bans sha256:... placeholders in fixtures) in a fixtures module that a
   future protocol-side test can share.
4. Serde: all types rename_all snake_case; flat record_kind-discriminated
   union (type-specific fields at top level); unknown namespaced extensions
   preserved losslessly; legacy input aliases recorded_at->observed_at and
   valid_to->valid_until accepted on deserialization, never emitted.
5. Tests: exhaustive validator tests; serde round-trips byte-stable on
   canonical fixtures; alias fixtures reserialize canonically; property tests
   for interval bounds, confidence bounds, scope non-widening helpers; the
   hash golden vectors.

Phase 1 gate items you own: no I/O added to stella-core; round trips
byte-stable; alias fixtures pass; hash vectors pass.

Run: cargo test -p stella-core && cargo fmt && cargo clippy -p stella-core
--all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-core): adaptive-context domain types,
validators, canonical JCS record hashing". Reconcile with landed work.
'''
depends_on = ["t00-baseline"]
claims = ["stella-core/src/lib.rs"]

[[tasks]]
id = "t02-protocol-events"
title = "Phase 1b: additive internal events + decoder characterization"
prompt = '''
You are one task in a fleet implementing Stella's Adaptive Context Lifecycle.
Read first: AGENTS.md; the build prompt (docs/design/adaptive-context/
stella-adaptive-context-build-prompt.md) — especially its warning: "Before
adding AgentEvent variants, characterize every replay decoder. Tagged Serde
enums commonly reject unknown variants." Implementation plan Phase 1,
stella-protocol section. stella-protocol is types only.

Deliver:

1. FIRST, characterization: find every AgentEvent replay decoder (the store
   events table readers, the session journal reader in stella-store/src/
   journal.rs, session_persist consumers, TUI model folds). Write a test that
   proves what happens TODAY when an unknown event line is decoded. If
   unknown variants fail decoding, add the mitigation the plan prescribes: a
   versioned unknown-event envelope (or documented gating of emission until
   all replay consumers tolerate additions) and a legacy-decoder replay
   fixture proving a new event is preserved or safely skipped without
   failing journal replay.
2. The nine additive internal events from implementation-plan Phase 1:
   ObservationRecorded, RecordProposalCreated, PromotionRecorded,
   ContextUseRecorded, ContextUseFeedbackRecorded, ArtifactContractSelected,
   ContractValidationCompleted, OutcomeAssessed, CompiledContextFrameBuilt —
   each with event id, schema_version, task/invocation identity where
   applicable, observed_at, and ONLY stable ids (no embedded record
   payloads). Also an AdvisoryNotice event for the TUI (proposal id,
   statement, evidence count, distinct task count, confidence, enforcement,
   sharing scope) since Phase 6's notice must disclose exactly those.
3. serde(default) on optional fields, snake_case tag, additive-only; round
   trips for every variant; a legacy-line tolerance test consistent with the
   file's existing style.

Run: cargo test -p stella-protocol -p stella-store && cargo fmt && cargo
clippy -p stella-protocol --all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-protocol): adaptive-context lifecycle
events + replay decoder characterization". Reconcile with landed work.
'''
depends_on = ["t00-baseline"]
claims = ["stella-protocol/src/lib.rs", "stella-protocol/src/event.rs"]

