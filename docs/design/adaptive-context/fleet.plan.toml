[[tasks]]
id = "t19-publication"
title = "Phase 8: rule-file mapping, explicit publication, solo-to-team"
prompt = '''
You are one task in a fleet implementing Stella's Adaptive Context Lifecycle.
Read first: the build prompt "Storage contract" + governance publication
paragraphs; implementation plan Phase 8 (frontmatter list, normative
file-to-record mapping, and gate); lifecycle spec section 14.

Deliver:

1. In stella-core/src/rules.rs: extend the hand-rolled frontmatter parser to
   accept the Phase 8 keys (schema_version, record_id, lineage_id,
   record_kind, record_status, directive_kind, origin,
   scope.repository_id, sharing_scope, enforcement, confidence,
   observed_at, valid_from, valid_until, supporting_evidence_ids,
   record_hash — NO promotion_stage) plus canonical snake_case guard
   aliases guard_tool/guard_deny_path/guard_deny_command alongside legacy
   hyphenated keys; emit canonical keys for generated files. The normative
   mapping: Markdown body -> statement; presentational name/description
   excluded from the ContextRecord and its record_hash; record_hash is the
   canonical semantic record hash (not a file hash); source-file hash
   stored separately in context.db. Witness: existing legacy files parse
   byte-identically (fails if aliases removed).
2. In stella-cli: explicit publication — `stella context publish <id>`
   creates the .stella/rules/<slug>.md file from a CONFIRMED directive as a
   new repository-shared revision + published PromotionEvent linking source
   and result records, and updates the read-only mirror. File creation,
   staging, committing, and pushing are separate authorities: this command
   only writes the file and prints the suggested next Git steps — it never
   stages or commits. Drift handling: a manual semantic edit that no longer
   matches record_hash is validated into a NEW immutable revision on next
   load, never a mutation.
3. Solo-to-team transition per Phase 8: multiple recent Git identities are
   a SIGNAL — `stella context governance` shows the detection and asks
   before changing mode (headless: prints, changes nothing); user-shared
   records stay private; repository-applicable proposals are listed for
   explicit publication; owner routing only when maintainers/code owners
   resolve. Wire `stella memory promote`'s transitional path (from the solo
   ladder task) to this real publication flow.
4. Tests = the Phase 8 gate: legacy rule files load unchanged; generated
   rules round-trip through the current loader and guard engine; personal
   evidence never enters Git; adding a collaborator requires no migration;
   repository mutation never occurs merely because a proposal is eligible.

Run: cargo test -p stella-core -p stella-cli && cargo fmt && cargo clippy
-p stella-core -p stella-cli --all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-cli): explicit rule publication and
solo-to-team transition". Reconcile with landed work.
'''
depends_on = ["t16-contracts-io"]
claims = [
  "stella-core/src/rules.rs",
  "stella-cli/src/context_cmd.rs",
  "stella-cli/src/rules.rs",
]

# ---------------------------------------------------------------------------
# Phase 9 — efficacy, staleness, pruning, Observatory
# ---------------------------------------------------------------------------

[[tasks]]
id = "t20-efficacy-pruning"
title = "Phase 9a: context-use lineage, efficacy projections, reversible pruning"
prompt = '''
You are one task in a fleet implementing Stella's Adaptive Context Lifecycle.
Read first: the build prompt "Context-use and pruning contract";
implementation plan Phase 9 (policy thresholds and gate are normative);
lifecycle spec 8.15 and 15.

Deliver:

1. Complete the use lineage: the frame compiler already emits selected;
   add rendered (when PromptContext actually includes the item) and cited
   (when the response/citation path references it) ContextUse events, all
   sharing one stable use_trace_id per record/frame/invocation.
   ContextUseFeedback records reference the exact context_use_id + trace
   id, with evaluation method, evaluator, real-opportunity flag, and
   attribution confidence. v1 evaluation methods are deterministic only:
   explicit user Keep/Ignore/correction on a cited directive, contract
   pass/fail bound to a selected contract, witness/verification outcomes.
   A failed task must not mark every selected record unhelpful (enforce:
   feedback requires opportunity + method).
2. Health projections rebuilt exactly from immutable events (the rebuild fn
   landed with the schema — finish and wire it): opportunity/selected/
   rendered/cited/evaluated/helpful/not_helpful/neutral counts, last-use
   timestamps, review_after, selection_health
   (healthy|review_due|stale|suppressed).
3. Reversible pruning per the exact Phase 9 policy: suppression eligibility
   only when >= 5 evaluated uses with real opportunity AND >= 80 percent
   attributable not_helpful AND attribution confidence meets threshold AND
   a simple interval test rejects noise; first action selection_health=
   stale + exclusion from automatic selection + a user notice (reuse the
   advisory notice surface); archive only after a grace period, as a new
   archived revision. NEVER auto-suppress blocking, critical, organization,
   pinned, or user-confirmed directives. `stella context health` and
   `stella context restore <id>` commands.
4. Tests = the Phase 9 gate: aggregates rebuild exactly from immutable
   records; negative attribution requires opportunity and method; stale
   records remain inspectable and restorable; suppressed records excluded
   from automatic retrieval; protected directives never auto-archived.

Run: cargo test -p stella-context -p stella-cli && cargo fmt && cargo
clippy -p stella-context -p stella-cli --all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-context): context-use lineage,
efficacy projections, reversible pruning". Reconcile with landed work.
'''
depends_on = ["t07-compaction-prompt", "t14-tui-advisory", "t19-publication"]
claims = [
  "stella-context/src/frame_compiler.rs",
  "stella-cli/src/context_cmd.rs",
  "stella-cli/src/prompt_context.rs",
]

[[tasks]]
id = "t21-observatory"
title = "Phase 9b: Observatory context lifecycle views"
prompt = '''
You are one task in a fleet implementing Stella's Adaptive Context Lifecycle.
Read first: implementation plan Phase 9 "Observatory". The Observatory
(stella-observatory) is loopback-only, read-only, GET-only, hand-rolled
HTTP, one embedded page with ZERO external references (a test enforces it).
It does not read context.db today; every new open is SQLITE_OPEN_READ_ONLY
and a missing/pre-migration db is an empty state, never an error.

Deliver: read-only routes + embedded page sections for the Phase 9 list —
frame lineage (per-invocation selections, exclusions, conflicts,
representations); evidence -> observation -> proposal -> promoted record
lineage; context use and efficacy (health projection with immutable-event
drill-down); stale/review-due/expiring records; contract selection and
validation results; scope and sharing transitions (promotion events).
Follow the existing db.rs route/handler idioms and page style. Tests: route
handlers against a fixture context.db; empty-state behavior; the
zero-external-reference page test stays green.

Run: cargo test -p stella-observatory && cargo fmt && cargo clippy -p
stella-observatory --all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-observatory): context lifecycle
views". Reconcile with landed work.
'''
depends_on = ["t20-efficacy-pruning"]
claims = [
  "stella-observatory/src/lib.rs",
  "stella-observatory/src/db.rs",
]

# ---------------------------------------------------------------------------
# Docs + final gate
# ---------------------------------------------------------------------------

[[tasks]]
id = "t22-docs"
title = "User docs, ADR completion, AGENTS.md updates"
prompt = '''
You are the documentation task of a fleet that implemented Phases 0-9 of
Stella's Adaptive Context Lifecycle. Read the spec bundle in
docs/design/adaptive-context/ and the ACTUAL landed command surfaces (the
context_cmd/context_contracts modules) — document what exists; where code
and spec differ, the code is right and the delta belongs in the ADR series.

Deliver:

1. stella-docs user docs (Fumadocs .mdx + meta.json registration):
   an adaptive-context concepts page (the six semantic families and their
   authority boundaries; the solo ladder; contracts; frames and
   PromptContext; privacy defaults — local-first, user-shared by default,
   publication explicit; the lifecycle/learning/governance settings tuple);
   commands/context.mdx (full `stella context` surface with examples);
   updates to commands/memory.mdx (promote delegation), configuration/
   settings.mdx (the context section), and the context-engine page (frame
   compilation and the recall seam).
2. Complete the ADR series in docs/design/adaptive-context/adr/ with any
   decisions individual tasks recorded in commit bodies (JCS strategy,
   json_schema checker choice, tokenizer_ref naming, deferred items:
   cached base/delta frames, intent taxonomy, workspace provider, Phase 10
   CGEP adapter).
3. AGENTS.md: extend the .stella table (context lifecycle records in
   context.db, .stella/context-snapshots/), note the settings tuple, and
   correct the external-protocol row: the protocol is Context Graph
   Exchange Protocol (repo context-graph-protocol, renamed from
   opencontextprotocol); Stella still depends on the pre-rename
   ocp-types/ocp-host coordinates at a pinned rev, and repointing is a
   Phase 10 prerequisite. Do NOT touch the context-graph-protocol
   repository itself — its work has a separate handoff prompt.

Verify the docs build if the JS toolchain is available; otherwise state so.
Commit via repo_commit: "docs(adaptive-context): user docs, ADR completion,
AGENTS.md updates". Reconcile with landed work.
'''
depends_on = ["t18-brandkit-witness", "t19-publication", "t21-observatory"]
claims = ["AGENTS.md"]

[[tasks]]
id = "t23-gate"
title = "Final gate: make gate green + verification artifact"
prompt = '''
You are the final task of a fleet that implemented Phases 0-9 of Stella's
Adaptive Context Lifecycle. Everything is committed in your tree. Leave the
workspace releasable.

1. Run the repo gate exactly as CI does: make gate (cargo fmt --check +
   file-size ratchet + cargo clippy --workspace --all-targets -- -D
   warnings + cargo test --workspace). Fix ALL fallout with minimal diffs
   (formatting, lints, ratchet splits, cross-crate breaks the per-crate
   runs missed). Re-run until green. No allow-attributes without a
   justifying comment.
2. Re-verify the master invariant at workspace level: with no `context`
   settings section, behavior is unchanged — run the tests asserting it
   and name them.
3. Audit the implementation plan's section 16 required witness matrix one
   final time: every row either maps to a passing test (name it) or is
   explicitly deferred with the phase that owns it (Phase 10 rows).
4. Write verifications/adaptive-context/SUMMARY.md (the repo's PR-evidence
   convention): gate output tail; the witness matrix with statuses; the
   implementation plan's section 19 completion criteria as a checklist,
   each marked met (with proving test/command) or deferred; feature flags
   and defaults; risks needing maintainer decisions.
5. Commit via repo_commit: "chore(workspace): green gate +
   adaptive-context verification artifact".

Your final summary must state plainly: gate green or not, which completion
criteria are met, which witnesses pass, and anything a human must review
before merging.
'''
depends_on = ["t11-git-inference", "t18-brandkit-witness", "t22-docs"]
claims = []
