Verify: `cargo test -p stella-serve` green; `docker build -f packaging/docker/Dockerfile.serve .` succeeds if a docker daemon is available (else document the exact build command). `make gate` green. COMMIT via repo_commit (scope: stella-serve/packaging). Uncommitted work is lost.
