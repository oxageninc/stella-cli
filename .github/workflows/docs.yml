name: docs

# The docs site's CI: lint, typecheck, and a production build of
# stella-docs/. Scoped to the paths that can affect the site, the mirror
# image of ci.yml's paths-ignore — every PR runs exactly one of the two
# (or both, when it genuinely touches both worlds).
on:
  pull_request:
    paths:
      - "stella-docs/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "stella-docs/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        # Version comes from the root package.json's packageManager field.

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: build
        run: pnpm build
