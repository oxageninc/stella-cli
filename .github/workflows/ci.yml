name: ci

on:
  pull_request:
    # Docs-site-only changes are covered by docs.yml — don't spend an hour
    # of Rust CI on them.
    paths-ignore:
      - "stella-docs/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
  push:
    branches: [main]
    paths-ignore:
      - "stella-docs/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  # PR pushes share a group keyed on the PR ref and cancel-in-progress, so a
  # rapid string of pushes to the same PR only pays for the latest one. Pushes
  # to main must NOT share a group across commits: GitHub only keeps one
  # "in progress" and one "queued" run per concurrency group — a third push
  # arriving while a prior main run is still queued silently cancels that
  # queued run rather than running it. That's how #258/#259/#261 landing in
  # quick succession broke main's file-size ratchet (command_deck.rs,
  # config.rs) on 2026-07-21 without a single red run to point at: several of
  # the intermediate push-triggered checks were superseded before they ever
  # started. Keying the group on github.sha for non-PR events gives every
  # commit to main its own group, so its full-repo check (fmt + ratchet +
  # clippy + test, over ALL tracked files — see check-file-sizes.sh) always
  # runs to completion and a ratchet-breaking union goes red within one run.
  group: ci-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    # Bundled SQLite (stella-store, rusqlite) and tree-sitter grammars are
    # heavy C compiles on a cold cache; rust-cache keeps warm runs fast.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: file-size ratchet
        run: scripts/check-file-sizes.sh

      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo build (release smoke, thin LTO)
        run: cargo build --workspace --release --config 'profile.release.lto="thin"' --config 'profile.release.codegen-units=16'

  supply-chain:
    name: cargo deny + cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny + cargo-audit
        run: cargo install --locked cargo-deny cargo-audit

      # Real gate (no `|| true`): advisories + dependency bans + source
      # provenance, configured in deny.toml. License checking is deliberately
      # left to a separate track (see deny.toml).
      - name: cargo deny check
        run: cargo deny check advisories bans sources

      - name: cargo audit
        run: cargo audit
